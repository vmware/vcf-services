<div class="main-content content-area">
  <router-outlet></router-outlet>
</div>

<clr-vertical-nav [clrVerticalNavCollapsible]="true">
  <a *ngFor="let navItem of navItems" clrVerticalNavLink routerLink="{{navItem.routerLink}}" routerLinkActive="active">
    <cds-icon *ngIf="navItem.iconShape" clrVerticalNavIcon [shape]="navItem.iconShape" title="{{navItem.labelKey}}"></cds-icon>
    {{navItem.labelKey}}
  </a>
</clr-vertical-nav>
